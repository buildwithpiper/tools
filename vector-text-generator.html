            function drawText(str) {
                let currentX = 0;
                let currentY = 0;
                let spacingX = parseFloat(document.getElementById('letter-spacing').value || '0.5');
                let spacingY = parseFloat(document.getElementById('line-height').value || '6.5');
                //  viewBox="0 0 6.27 6.48"
                let svgElem = '<svg xmlns="http://www.w3.org/2000/svg" id="svg1" version="1.1" VIEWBOX><g id="text_group" transform="scale(10)" fill="none" stroke="black" stroke-width="0.1">';
                for (i = 0; i < str.length; i++) {
                    let c = str.charCodeAt(i);
                    if (c === 32) {
                        currentX += spacingX * 4;
                    } else if (c === 10 || c === 13) {
                        currentX = 0;
                        currentY += spacingY;
                    } else if (c < 127) {
                        let f = MontserratVectorFont[c - 33];
                        svgElem += `<path d="M${f[0]} ${f[1]} ${f[2]}" transform="translate(${currentX} ${currentY})"/>`;
                        currentX += f[3] + f[4] + spacingX;
                    }
                }
                svgElem += '</g></svg>';

                svgElem = svgElem.replace(/VIEWBOX/g, `veiwBox="0 0 ${currentX + 7} ${currentY + spacingY + 2}"`);
                document.getElementById('result').innerHTML = svgElem;

                let bb = document.getElementById('text_group').getBBox();
                document.getElementById('svg1').style.width = (bb.width + 5) * 10 + 'px';
                document.getElementById('svg1').style.height = (bb.height + 5) * 10 + 'px';

                let svg_img = document.getElementById('result').innerHTML;
                
                document.getElementById('result').innerHTML = `<img id="svg-img" src='data:image/svg+xml;utf8,${svg_img}'/>`;
                document.getElementById('svg-img').style.width = (bb.width + 5) * 10 + 'px';
                document.getElementById('svg-img').style.height = (bb.height + 5) * 10 + 'px';
            }

            document.getElementById('img-gen').addEventListener('click', () => {
                drawText(document.getElementById('text-input').value);
            });
